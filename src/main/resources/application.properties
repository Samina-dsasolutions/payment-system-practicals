spring.application.name=payment-system
management.endpoints.web.exposure.include=health,info
info.app.java.version=${java.version}
info.app.spring-boot.version=${project.parent.version}




# Enable Flyway

# Location of migration scripts (classpath:db/migration is the standard)
spring.flyway.locations=classpath:db/migration
# Ensure Flyway baseline is created if the table doesn't exist
spring.flyway.baseline-on-migrate=true


# MySQL Connection
spring.datasource.url=jdbc:mysql://localhost:3306/paymentdb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-className=com.mysql.cj.jdbc.Driver

# Flyway Migration for MySQL (Spring Boot 3 specialization)
spring.flyway.clean-disabled=false

spring.flyway.enabled=true
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}

# Change this to 'validate' so Hibernate doesn't try to add columns incorrectly
spring.jpa.hibernate.ddl-auto=validate